name: Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check forbidden files
        run: python scripts/check_forbidden_files.py
      - name: Check CLI scaffold
        run: PYTHONPATH=src python -m muse_tmr.cli.main --help

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite with coverage
        run: |
          python -m pytest tests/ \
            --cov=muse_tmr --cov-report=term-missing --cov-report=xml
