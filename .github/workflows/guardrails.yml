name: Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
      - name: Show Python
        run: python3 --version
      - name: Check forbidden files
        run: python3 scripts/check_forbidden_files.py
      - name: Check CLI scaffold
        run: PYTHONPATH=src python3 -m muse_tmr.cli.main --help
