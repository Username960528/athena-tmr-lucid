name: Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check forbidden files
        run: python scripts/check_forbidden_files.py
      - name: Check CLI scaffold
        run: PYTHONPATH=src python -m muse_tmr.cli.main --help
